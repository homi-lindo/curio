org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Keep the legacy (non-built-in) Kotlin plugin model. AGP is pinned to 8.11.1
# (see settings.gradle.kts) because AGP 9's built-in-Kotlin default is not yet
# supported by the plugins we depend on (e.g. file_picker).
android.builtInKotlin=false
android.newDsl=false
# A compilação incremental do daemon Kotlin quebra no Windows com
# "Could not close incremental caches / Storage is already registered"
# (FilePageCache registra o mesmo .tab duas vezes) ao compilar os plugins
# (file_picker, audioplayers_android). Em build de release o incremental
# não traz ganho; desligado para o build ser determinístico.
kotlin.incremental=false
